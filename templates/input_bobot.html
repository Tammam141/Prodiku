<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <title>Input Bobot Kriteria - ProdiKu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='input_bobot.css') }}">
</head>

<body>
    <div class="container">
        <div class="header-colorful">
            <div class="progress-indicator" style="font-weight: 700; text-transform: uppercase; margin-bottom: 10px; opacity: 0.8;">
                Langkah <strong>1</strong> dari 3
            </div>
            <h2>Prioritasmu?</h2>
            <p class="subtitle">
                Tentukan tingkat kepentingan setiap kriteria (0-50). Semakin tinggi angkanya, semakin besar pengaruhnya pada hasil akhir rekomendasi!
            </p>
        </div>

        <div class="form-content">
            <div id="error-message" class="error-message"></div>

            <form action="{{ url_for('input_bobot', user_id=user.user_id) }}" method="POST" onsubmit="return validateBobotForm(event)">
                <div class="form-group">
                    <label for="nama">Nama Lengkap:</label>
                    <input type="text" name="nama" id="nama" placeholder="Masukkan nama Anda..." required />
                </div>

                {% for k in kriteria %}
                <div class="form-group">
                    <label for="bobot_{{ k.kriteria_id }}">{{ k.nama_kriteria }} ({{ k.kode_kriteria }})</label>
                    <select name="bobot_{{ k.kriteria_id }}" class="bobot-input" required>
                        <option value="0">0 - Tidak Penting Sama Sekali</option>
                        <option value="5">5 - Sangat Tidak Penting</option>
                        <option value="10">10 - Tidak Penting</option>
                        <option value="15">15 - Kurang Penting</option>
                        <option value="20" selected>20 - Cukup Penting</option>
                        <option value="25">25 - Penting</option>
                        <option value="30">30 - Agak Penting</option>
                        <option value="35">35 - Sangat Penting</option>
                        <option value="40">40 - Amat Penting</option>
                        <option value="45">45 - Prioritas Tinggi</option>
                        <option value="50">50 - Wajib Ada</option>
                    </select>
                    <div class="bobot-info">
                        <span>Porsi kontribusi:</span>
                        <span class="percentage">0.0%</span>
                    </div>
                </div>
                {% endfor %}

                <button type="submit">
                    Lanjut ke Survei <i class="fas fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        function normalizeBobot() {
            const inputs = document.querySelectorAll('.bobot-input');
            let total = 0;
            inputs.forEach(i => total += (parseFloat(i.value) || 0));

            inputs.forEach(i => {
                const percentageSpan = i.closest('.form-group').querySelector('.percentage');
                if (total > 0) {
                    const normalized = ((parseFloat(i.value) || 0) / total * 100);
                    percentageSpan.innerText = normalized.toFixed(1) + '%';
                } else {
                    percentageSpan.innerText = '0.0%';
                }
            });
        }

        function validateBobotForm(event) {
            const inputs = document.querySelectorAll('.bobot-input');
            let allZero = true;
            inputs.forEach(i => { if(parseFloat(i.value) > 0) allZero = false; });

            const errDiv = document.getElementById('error-message');
            if (allZero) {
                errDiv.innerText = "Minimal satu kriteria harus memiliki bobot lebih dari 0.";
                errDiv.classList.add('show');
                window.scrollTo(0, 0);
                event.preventDefault();
                return false;
            }
            return true;
        }

        document.querySelectorAll('.bobot-input').forEach(i => {
            i.addEventListener('change', normalizeBobot);
        });
        
        window.addEventListener('DOMContentLoaded', normalizeBobot);
    </script>
</body>

</html>
