<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Hasil Rekomendasi - ProdiKu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        :root {
            --primary: #28a745;
            --secondary: #2196F3;
            --text-dark: #333;
            --bg: #f4f7f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); padding: clamp(10px, 3vw, 30px); display: flex; justify-content: center; }

        .container {
            max-width: 700px; /* Diperkecil agar lebih compact */
            width: 100%;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 25px;
            text-align: center;
        }

        .header h2 { font-size: 1.5rem; margin-bottom: 5px; }
        .header p { font-size: 0.9rem; opacity: 0.9; }

        .content { padding: 20px; }

        /* UI Ringkas: List Card Style alih-alih Tabel Lebar */
        .result-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
            gap: 15px;
        }

        .rank-circle {
            width: 40px; height: 40px;
            background: var(--bg);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; color: var(--text-dark);
            flex-shrink: 0;
        }

        .prodi-info { flex-grow: 1; }
        .prodi-info h3 { font-size: 1rem; color: var(--text-dark); }
        .prodi-info p { font-size: 0.8rem; color: #777; margin-top: 2px; }

        .score-badge {
            text-align: right;
            font-weight: 700;
            color: var(--primary);
            font-size: 1rem;
        }

        .status-tag {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 4px;
            color: white;
            display: inline-block;
            margin-top: 5px;
        }
        .tag-best { background: var(--primary); }
        .tag-good { background: var(--secondary); }
        .tag-other { background: #999; }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 25px;
        }

        .btn {
            padding: 12px; border-radius: 8px; border: none;
            font-weight: 600; cursor: pointer; text-decoration: none;
            text-align: center; font-size: 0.9rem; transition: 0.3s;
        }
        .btn-home { background: #eee; color: #555; }
        .btn-pdf { background: var(--primary); color: white; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        @media (max-width: 500px) {
            .btn-group { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container" id="report-card">
    <div class="header">
        <h2>Rekomendasi Pilihanmu</h2>
        <p>Nama: <strong>{{ user.nama }}</strong></p>
    </div>

    <div class="content">
        {% for h in hasil %}
        <div class="result-item">
            <div class="rank-circle">{{ loop.index }}</div>
            <div class="prodi-info">
                <h3>{{ h.nama_prodi }}</h3>
                {% if loop.index == 1 %}
                <span class="status-tag tag-best">Pilihan Utama</span>
                {% elif loop.index == 2 %}
                <span class="status-tag tag-good">Opsi Kedua</span>
                {% endif %}
                <p>{{ h.deskripsi[:80] }}...</p>
            </div>
            <div class="score-badge">
                {{ "%.4f"|format(h.skor_akhir) }}
            </div>
        </div>
        {% endfor %}

        <div class="btn-group">
            <a href="{{ url_for('index') }}" class="btn btn-home">Kembali</a>
            <button onclick="downloadPDF()" class="btn btn-pdf">
                <i class="fas fa-download"></i> Simpan PDF
            </button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
    async function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const element = document.getElementById("report-card");
        const btnGroup = document.querySelector(".btn-group");

        // 1. Sembunyikan tombol agar tidak ikut terdownload
        btnGroup.style.display = "none";

        // 2. Gunakan Scale Tinggi (3 atau 4) untuk mempertajam gambar
        const canvas = await html2canvas(element, {
            scale: 3, // Semakin tinggi semakin tajam (High Definition)
            useCORS: true,
            logging: false,
            backgroundColor: "#ffffff"
        });

        const imgData = canvas.toDataURL('image/jpeg', 1.0); // Kualitas 100%
        const pdf = new jsPDF('p', 'mm', 'a4');
        
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;

        pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight, undefined, 'FAST');
        pdf.save(`Hasil_Prodi_${ "{{ user.nama }}" }.pdf`);

        // 3. Munculkan kembali tombol
        btnGroup.style.display = "grid";
    }
</script>

</body>
</html>
