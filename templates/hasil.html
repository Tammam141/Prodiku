<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Hasil Rekomendasi - ProdiKu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        :root {
            --primary-dark: #1e7e34;
            --secondary-dark: #1565c0;
            --text-dark: #2c3e50;
            --bg-body: #f4f7f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 650px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-dark), var(--secondary-dark));
            color: #fff;
            padding: 45px 30px;
            text-align: center;
        }

        .header h2 {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .content {
            padding: 30px 25px;
        }

        .result-card {
            display: flex;
            align-items: center;
            background: #fff;
            border: 2px solid #f0f0f0;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .rank-circle {
            width: 48px;
            height: 48px;
            background: #f8f9fa;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            margin-right: 18px;
        }

        .rank-1 {
            border-color: #2ecc71;
        }

        .prodi-info {
            flex-grow: 1;
        }

        .score-box {
            text-align: right;
        }

        .btn-container {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border-radius: 14px;
            color: white;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }

        .btn-home {
            background: #ccc;
            color: #000;
        }

        .btn-simpan {
            background: #e74c3c;
        }

        /* 🔥 MODE KHUSUS PDF */
        .pdf-mode * {
            opacity: 1 !important;
            filter: none !important;
            text-shadow: none !important;
        }

        .pdf-mode body {
            background: #ffffff !important;
        }

        .pdf-mode .container {
            box-shadow: none !important;
            background: #ffffff !important;
        }

        .pdf-mode .header {
            background: #1e7e34 !important;
            background-image: none !important;
        }

        .pdf-mode .header * {
            color: #ffffff !important;
        }

        .pdf-mode .result-card {
            background: #ffffff !important;
            border: 1px solid #ddd !important;
            box-shadow: none !important;
        }
    </style>
</head>

<body>

<div class="container" id="report-content">
    <div class="header">
        <p>HASIL ANALISIS MOORA</p>
        <h2>Rekomendasi Program Studi</h2>
        <p>Halo <strong>{{ user.nama }}</strong></p>
    </div>

    <div class="content">
        {% for h in hasil %}
        <div class="result-card {% if loop.index == 1 %}rank-1{% endif %}">
            <div class="rank-circle">{{ loop.index }}</div>

            <div class="prodi-info">
                <h3>{{ h.nama_prodi }}</h3>
                <p>{{ h.deskripsi[:95] }}...</p>
            </div>

            <div class="score-box">
                <strong>{{ "%.4f"|format(h.skor_akhir) }}</strong>
                <span>SKOR</span>
            </div>
        </div>
        {% endfor %}

        <div class="btn-container">
            <a href="{{ url_for('index') }}" class="btn btn-home">Ulangi</a>
            <button onclick="downloadPDF()" class="btn btn-simpan">Download PDF</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
async function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const element = document.querySelector("#report-content");
    const btnArea = document.querySelector(".btn-container");

    document.body.classList.add("pdf-mode");
    btnArea.style.display = "none";

    try {
        const canvas = await html2canvas(element, {
            scale: 2.5,
            backgroundColor: "#ffffff"
        });

        const imgData = canvas.toDataURL("image/jpeg", 1.0);

        const pdf = new jsPDF('p', 'mm', 'a4');

        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = pdf.internal.pageSize.getHeight();

        const imgHeight = (canvas.height * pdfWidth) / canvas.width;

        let heightLeft = imgHeight;
        let position = 0;

        pdf.addImage(imgData, 'JPEG', 0, position, pdfWidth, imgHeight);
        heightLeft -= pdfHeight;

        while (heightLeft > 0) {
            position = heightLeft - imgHeight;
            pdf.addPage();
            pdf.addImage(imgData, 'JPEG', 0, position, pdfWidth, imgHeight);
            heightLeft -= pdfHeight;
        }

        pdf.save("Hasil_Rekomendasi_Prodi.pdf");

    } catch (e) {
        console.error(e);
    } finally {
        document.body.classList.remove("pdf-mode");
        btnArea.style.display = "flex";
    }
}
</script>

</body>
</html>
